name: Release

on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'
      - 'go.mod'
      - 'go.sum'
      - '**/*.go'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Configure Git for Private Modules
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        if: env.GH_PAT != ''
        run: |
          git config --global url."https://${GH_PAT}@github.com/Chalupa-Tech".insteadOf "https://github.com/Chalupa-Tech"

      - name: Tidy modules
        run: go mod tidy

      - name: Verify clean modules
        run: |
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod or go.sum is not tidy. Please run 'go mod tidy' and commit the changes."
            git diff
            exit 1
          fi

      - name: Run Tests
        run: go test -v ./... || echo "No tests found"

      - name: Extract Release Data
        id: extract
        run: |
          VERSION=$(grep -m 1 "^## \[" CHANGELOG.md | sed -E 's/## \[([^]]+)\].*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not extract version from CHANGELOG.md"
            exit 1
          fi
          echo "Current Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists. Skipping release."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            awk '/^## \[/{if (p) exit; p=1; next} p' CHANGELOG.md > release_notes.md
          fi

      - name: Create Release
        if: steps.extract.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.extract.outputs.version }}
          name: v${{ steps.extract.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
